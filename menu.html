<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Menu </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
    .logo {
    width: 160px;
    height: 70px;
    display: flex;
    align-items: center;
}

.logo img {
    max-width: 100px;
    max-height: 100px;
    object-fit: contain;
}
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* TOPO */
    .topo {
        background-color: #0f9c9c;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 30px;
    }

    .busca {
        flex: 1;
        margin: 0 30px;
        display: flex;
    justify-content: center;
    }

    .busca input {
        width: 600px;
        padding: 10px;
        border-radius: 30px;
        border: none;
        outline: none;
    }

    .icons {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .icons i {
    font-size: 30px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.icons i:hover {
    color: #ffcc00;
    transform: scale(1.2);
}

    /* MENU */
    .menu {
        background-color: #eee;
        padding: 10px 30px;
    }

    .menu ul {
    max-width: 1200px;
    margin: 0;
    padding-left: 550px; /* controla distância da esquerda */
    display: flex;
    justify-content: flex-start;
    gap: 50px;
}

    .menu li {
        cursor: pointer;
        font-size: 14px;
        color: #333;
    }

    .menu li:hover {
        color: #333;
    }

    .menu .highlight {
        color: #333;
        font-weight: bold;
    }

  .search-box {
    position: relative;
    width: 100%;
    max-width: 600px;
}

.search-box input {
    width: 100%;
    padding: 12px 50px 12px 20px; /* espaço pra lupa */
    border-radius: 30px;
    border: none;
    outline: none;
    background-color: #eee; /* igual da imagem */
}

/* LUPA */
.search-box i {
    position: absolute;
    right: 15px; /* posição perfeita no canto */
    top: 50%;
    transform: translateY(-50%);
    color: #333; /* laranja igual da imagem */
    font-size: 20px;
    pointer-events: none;
}
.todos {
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1; /* evita desalinhamento */
}

.todos i {
    font-size: 16px; /* igual ao texto */
    color: #333;
}
.user {
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    cursor: pointer;
}

.user span {
    font-size: 14px;
}

.user:hover span,
.user:hover i {
    color: #ffcc00;
}
.carousel {
    position: relative;
    width: 100%;
    max-width: 1600px; /* ou 100% se quiser ocupar tudo */
    height: 350px;
    margin: 30px auto;
    overflow: hidden;
}

.carousel-track {
    display: flex;
    gap: 30px;
    transition: transform 0.7s ease-in-out;
}

.slide {
    min-width: 70%; /* controla quanto aparece nas laterais */
    max-width: 70%;
    height: 350px;
    border-radius: 25px;
    overflow: hidden;
    flex-shrink: 0;
    margin: 0 auto; /* centraliza */
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* esfumado branco nas laterais */
.carousel::before,
.carousel::after {
    content: "";
    position: absolute;
    top: 0;
    width: 140px;
    height: 100%;
    z-index: 5;
    pointer-events: none;
}

.carousel::before {
    left: 0;
    background: linear-gradient(to right, white, transparent);
}

.carousel::after {
    right: 0;
    background: linear-gradient(to left, white, transparent);
}

/* bolinhas */
.indicators {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

.indicators span {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: 0.3s;
}

.indicators .active {
    background: #00b4b6;
    transform: scale(1.2);
}




</style>
</head>
<body>

<div class="topo">
    <div class="logo">
    <img src="imagens/logo.png" alt="Garra & Patas Pet Shop">
</div>
<div class="busca">
    <div class="search-box">
        <input type="text" placeholder="O melhor para seu pet você encontra aqui.">
        <i class="bi bi-search"></i>
    </div>
</div>

    <div class="icons">
   <div class="user">
        <i class="bi bi-person"></i>
        <span>Entre ou cadastre-se</span>
    </div>

    <i class="bi bi-heart"></i>
    <i class="bi bi-cart"></i>
    </div>
</div>

<div class="menu">
    <ul>
        <li class="todos">
        <i class="bi bi-list-ul"></i>
        Todos
        </li>
        <li>Cachorros</li>
        <li>Gatos</li>
        <li>Promoções</li>
        <li>Lojas</li>
        <li>Blog</li>
        <li>Atendimento</li>
    </ul>
</div>  

<div class="carousel">
  <div class="carousel-track">
    <div class="slide" style="--bg:url('1.png')">
  <img src="imagens/1.1.png">
</div>
    <div class="slide" style="--bg:url('2.png')">
  <img src="imagens/2.png">
</div>
    <div class="slide" style="--bg:url('3.png')">
  <img src="imagens/3.png">
</div>
    <div class="slide" style="--bg:url('4.png')">
  <img src="imagens/4.png">
</div>
 <div class="slide" style="--bg:url('4.png')">
  <img src="imagens/5.png">
</div>
  </div>

  <div class="indicators"></div>
</div>

<script>
const track = document.querySelector('.carousel-track');
let slides = document.querySelectorAll('.slide');
const indicatorsContainer = document.querySelector('.indicators');

let index = 1;

/* 🔥 CLONAR PRIMEIRO E ÚLTIMO */
const firstClone = slides[0].cloneNode(true);
const lastClone = slides[slides.length - 1].cloneNode(true);

track.appendChild(firstClone);
track.insertBefore(lastClone, slides[0]);

slides = document.querySelectorAll('.slide');

/* 🔥 CRIAR BOLINHAS (sem clones) */
for (let i = 0; i < slides.length - 2; i++) {
    const dot = document.createElement('span');
    dot.addEventListener('click', () => goToSlide(i + 1));
    indicatorsContainer.appendChild(dot);
}

const dots = document.querySelectorAll('.indicators span');

function updateCarousel(animate = true) {
    const slideWidth = slides[0].offsetWidth + 30;
    const offset = (track.offsetWidth - slideWidth) / 2;

    track.style.transition = animate ? "0.7s ease-in-out" : "none";
    track.style.transform = `translateX(calc(-${index * slideWidth}px + ${offset}px))`;

    dots.forEach(dot => dot.classList.remove('active'));

    let realIndex = index - 1;
    if (realIndex < 0) realIndex = dots.length - 1;
    if (realIndex >= dots.length) realIndex = 0;

    dots[realIndex].classList.add('active');
}

function nextSlide() {
    index++;
    updateCarousel();

    if (index === slides.length - 1) {
        setTimeout(() => {
            index = 1;
            updateCarousel(false);
        }, 700);
    }
}

function prevSlide() {
    index--;
    updateCarousel();

    if (index === 0) {
        setTimeout(() => {
            index = slides.length - 2;
            updateCarousel(false);
        }, 700);
    }
}

function goToSlide(i) {
    index = i;
    updateCarousel();
}

/* autoplay */
setInterval(nextSlide, 4000);

window.addEventListener('resize', () => updateCarousel(false));

updateCarousel(false);
</script>

</body>
</html>
