<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Menu </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
    .logo {
    width: 160px;
    height: 70px;
    display: flex;
    align-items: center;
}

.logo img {
    max-width: 100px;
    max-height: 100px;
    object-fit: contain;
}
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* TOPO */
    .topo {
        background-color: #0f9c9c;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 30px;
    }

    .busca {
        flex: 1;
        margin: 0 30px;
        display: flex;
    justify-content: center;
    }

    .busca input {
        width: 600px;
        padding: 10px;
        border-radius: 30px;
        border: none;
        outline: none;
    }

    .icons {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .icons i {
    font-size: 30px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.icons i:hover {
    color: #ffcc00;
    transform: scale(1.2);
}

    /* MENU */
    .menu {
        background-color: #eee;
        padding: 10px 30px;
    }

    .menu ul {
    max-width: 1200px;
    margin: 0;
    padding-left: 550px; /* controla distância da esquerda */
    display: flex;
    justify-content: flex-start;
    gap: 50px;
}

    .menu li {
        cursor: pointer;
        font-size: 14px;
        color: #333;
    }

    .menu li:hover {
        color: #333;
    }

    .menu .highlight {
        color: #333;
        font-weight: bold;
    }

  .search-box {
    position: relative;
    width: 100%;
    max-width: 600px;
}

.search-box input {
    width: 100%;
    padding: 12px 50px 12px 20px; /* espaço pra lupa */
    border-radius: 30px;
    border: none;
    outline: none;
    background-color: #eee; /* igual da imagem */
}

/* LUPA */
.search-box i {
    position: absolute;
    right: 15px; /* posição perfeita no canto */
    top: 50%;
    transform: translateY(-50%);
    color: #333; /* laranja igual da imagem */
    font-size: 20px;
    pointer-events: none;
}
.todos {
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1; /* evita desalinhamento */
}

.todos i {
    font-size: 16px; /* igual ao texto */
    color: #333;
}
.user {
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    cursor: pointer;
}

.user span {
    font-size: 14px;
}

.user:hover span,
.user:hover i {
    color: #ffcc00;
}
.carousel {
  position: relative;
  width: 100%;
  max-width: 1200px;
  height: 350px; /* 🔥 altura reduzida */
  margin: auto;
  overflow: hidden;
  border-radius: 20px;
}

.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.7s ease-in-out;
}

.slide {
  min-width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(15px);
  transform: scale(1.1);
  z-index: 1;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 preenche tudo */
  object-position: center; /* mantém o foco no centro */
}

/* Indicadores */
.indicators {
  position: absolute;
  bottom: 12px;
  width: 100%;
  text-align: center;
}

.indicators span {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 4px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.indicators .active {
  background: #00b4b6;
  transform: scale(1.2);
}

/* Responsivo */
@media (max-width: 768px) {
  .carousel {
    height: 220px;
  }
}
.carousel {
  margin-top: 30px; /* ajuste como quiser */
}




</style>
</head>
<body>

<div class="topo">
    <div class="logo">
    <img src="logo.png" alt="Garra & Patas Pet Shop">
</div>
<div class="busca">
    <div class="search-box">
        <input type="text" placeholder="O melhor para seu pet você encontra aqui.">
        <i class="bi bi-search"></i>
    </div>
</div>

    <div class="icons">
   <div class="user">
        <i class="bi bi-person"></i>
        <span>Entre ou cadastre-se</span>
    </div>

    <i class="bi bi-heart"></i>
    <i class="bi bi-cart"></i>
    </div>
</div>

<div class="menu">
    <ul>
        <li class="todos">
        <i class="bi bi-list-ul"></i>
        Todos
        </li>
        <li>Cachorros</li>
        <li>Gatos</li>
        <li>Promoções</li>
        <li>Lojas</li>
        <li>Blog</li>
        <li>Atendimento</li>
    </ul>
</div>  

<div class="carousel">
  <div class="carousel-track">
    <div class="slide" style="--bg:url('1.png')">
  <img src="1.png">
</div>
    <div class="slide" style="--bg:url('2.png')">
  <img src="2.png">
</div>
    <div class="slide" style="--bg:url('3.png')">
  <img src="3.png">
</div>
    <div class="slide" style="--bg:url('4.png')">
  <img src="4.png">
</div>
  </div>

  <div class="indicators"></div>
</div>

<script>
const track = document.querySelector('.carousel-track');
const slides = document.querySelectorAll('.slide');
const indicatorsContainer = document.querySelector('.indicators');

let index = 0;

/* Criar bolinhas */
slides.forEach((_, i) => {
  const dot = document.createElement('span');
  dot.addEventListener('click', () => goToSlide(i));
  indicatorsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.indicators span');

function updateCarousel() {
  track.style.transform = `translateX(-${index * 100}%)`;

  dots.forEach(dot => dot.classList.remove('active'));
  dots[index].classList.add('active');
}

function nextSlide() {
  index = (index + 1) % slides.length;
  updateCarousel();
}

function goToSlide(i) {
  index = i;
  updateCarousel();
}

/* 🔥 Autoplay direto */
setInterval(nextSlide, 4000);

updateCarousel();
</script>

</body>
</html>
