<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Criar conta</title>
    <link rel="stylesheet" href="../css/style-criar-conta.css">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
</head>
<body>
<body>

<div class="topo">

    <div class="logo">
        <img src="../imagens/logo.png" alt="Garra & Patas">
    </div>

    <div class="espaco-topo"></div>

    <div class="icons">
        <div class="user">
            <a href="criar-conta.html">
                <i class="bi bi-lock"></i>
                <span>Ambiente seguro</span>
            </a>
        </div>
    </div>

</div>

<div class="box">

    <img src="../imagens/gato.png" class="gato">
    <img src="../imagens/cachorro.png" class="cachorro">
    <img src="../imagens/biscoito.png" class="biscoito">
    <img src="../imagens/racao.png" class="racao">

    <div class="form-box">
        <a href="menu.html" class="voltar">X</a>

        <h2>Criar conta</h2>
        <p>Já tem uma conta? <a href="form.html">Fazer login</a></p>

        <form action="welcome.php" method="POST">

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="text" id="email"
                    placeholder="Digite seu E-mail" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha"
                    placeholder="Digite sua senha" required>
            </div>

            <div class="input-group">
                <label for="confsenha">Confirmar senha</label>
                <input type="password" id="confsenha"
                    placeholder="Digite novamente sua senha" required>
            </div>

            <div class="input-group">
                <button type="submit">Criar conta</button>
            </div>

        </form>
    </div>
</div>

</body>
</body>
</html>
